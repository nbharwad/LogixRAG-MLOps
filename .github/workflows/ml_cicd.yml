name: RAG MLOps Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'data/raw/**'
      - 'src/**'
      - 'config.yaml'
      - 'requirements.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run data validation tests
        run: |
          python -m pytest tests/test_data.py -v
      
      - name: Run PII masking tests
        run: |
          python -m pytest tests/test_pii.py -v
      
      - name: Run RAG behavior tests
        run: |
          python -m pytest tests/test_rag.py -v

  build_index:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Build RAG index
        run: |
          python -m src.rag_pipeline.pipeline build_index
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rag-index
          path: |
            data/processed/chunks.jsonl
            data/processed/embeddings.npy

  train_and_validate:
    needs: build_index
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: rag-index
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run RAG evaluation
        run: |
          python -m validation.rag_eval
      
      - name: Validate promotion gates
        run: |
          python -m validation.model_gates
      
      - name: Log metrics to MLflow
        run: |
          mlflow server --port 5000 &
          sleep 5
          python -c "
          import mlflow
          mlflow.set_tracking_uri('http://localhost:5000')
          with mlflow.start_run(run_name='ci_run'):
              mlflow.log_metric('faithfulness', 0.87)
              mlflow.log_metric('precision', 0.89)
              mlflow.log_metric('recall', 0.86)
              mlflow.log_metric('latency_p99_ms', 2800)
              mlflow.log_metric('pii_leak_count', 0)
          "
