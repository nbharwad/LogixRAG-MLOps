project: LogixRAG-MLOps

registry: features/feature_store/registry

provider: sqlite

online_store:
  type: sqlite
  path: features/feature_store/online.db

offline_store:
  type: sqlite
  path: features/feature_store/offline.db

entity_key_join_keys:
  - policy_id

features:
  - name: policy_features
    entities:
      - policy_id
    ttl: 86400
    features:
      - name: chunk_count
        dtype: INT64
        description: Number of chunks for this policy
      - name: avg_chunk_length
        dtype: FLOAT
        description: Average chunk length
      - name: last_updated
        dtype: STRING
        description: Last update timestamp
      - name: policy_type
        dtype: STRING
        description: Type of insurance policy
      - name: embedding_version
        dtype: INT64
        description: Version of embeddings
